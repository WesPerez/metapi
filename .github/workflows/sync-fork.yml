name: Sync fork branches

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

concurrency:
  group: sync-fork-branches
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: |
          git remote add upstream https://github.com/cita-777/metapi.git
          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mine:refs/remotes/origin/mine
          git fetch upstream +refs/heads/main:refs/remotes/upstream/main

      - name: Keep main identical to upstream/main
        run: |
          set -euo pipefail
          git push origin refs/remotes/upstream/main:refs/heads/main --force-with-lease

      - name: Rebase mine on synced main
        id: rebase
        continue-on-error: true
        run: |
          set -euo pipefail
          git checkout -B mine origin/mine
          git rebase upstream/main
          git push origin mine --force-with-lease

      - name: Set up Docker Buildx
        if: steps.rebase.outcome == 'success'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.rebase.outcome == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        if: steps.rebase.outcome == 'success'
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push mine image
        if: steps.rebase.outcome == 'success'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/metapi:mine
            ghcr.io/${{ steps.repo.outputs.owner }}/metapi:mine-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report mine rebase conflict
        if: steps.rebase.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "sync: mine rebase on upstream/main failed" \
            --body "The scheduled sync kept main aligned with upstream/main, but mine could not be rebased automatically. Please rebase mine on upstream/main locally, resolve conflicts, and force-push mine."
          exit 1
